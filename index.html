<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MediAlarme Plus - Toca com Tela Bloqueada</title>

<style>
/* ========== CSS COMPLETO ========== */
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary: #667eea;
  --primary-dark: #764ba2;
  --success: #22c55e;
  --danger: #dc2626;
  --warning: #f59e0b;
}

body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  margin: 0;
  min-height: 100vh;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
  padding-bottom: 80px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.header h1 {
  margin: 0;
  font-size: 1.8rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.btn-history {
  background: rgba(255,255,255,0.2);
  padding: 10px 18px;
  font-size: 14px;
  width: auto;
  border-radius: 40px;
  backdrop-filter: blur(5px);
  border: none;
  color: white;
  cursor: pointer;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.card h3 {
  margin-top: 0;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
  font-weight: bold;
}

input {
  background: white;
  text-align: center;
  color: #1f2937;
}

input:focus {
  outline: none;
  transform: scale(1.02);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
}

.multi-time {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.multi-time input {
  flex: 1;
  padding: 12px;
  font-size: 14px;
  min-width: 80px;
}

button {
  background: var(--success);
  color: white;
  cursor: pointer;
  transition: transform 0.1s;
}

button:active {
  transform: scale(0.97);
}

.btn-add {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  font-size: 18px;
  margin-top: 20px;
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 20px 0 10px;
}

.badge {
  background: rgba(255,255,255,0.3);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
}

#list > div {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(5px);
  padding: 16px;
  border-radius: 20px;
  margin-top: 12px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.alarm-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.alarm-info {
  flex: 1;
}

.alarm-info strong {
  font-size: 18px;
  display: block;
}

.alarm-times {
  font-size: 13px;
  opacity: 0.9;
  margin-top: 5px;
}

.delete {
  background: var(--danger);
  padding: 8px 18px;
  border-radius: 40px;
  font-size: 14px;
  width: auto;
}

/* TELA DE ALARME - ESSENCIAL PARA TELA BLOQUEADA */
#alarmScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  text-align: center;
  animation: pulse 0.8s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.95; background: linear-gradient(135deg, #ee5a24, #ff6b6b); }
}

#alarmScreen h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

.med-name {
  font-size: 48px;
  font-weight: bold;
  background: white;
  color: black;
  padding: 25px 40px;
  border-radius: 80px;
  margin: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.alarm-buttons {
  display: flex;
  gap: 20px;
  margin-top: 40px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-tomado, .btn-snooze {
  font-size: 24px;
  padding: 15px 35px;
  width: auto;
}

.btn-tomado { background: var(--success); }
.btn-snooze { background: var(--warning); }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 10000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(5px);
}

.modal-content {
  background: white;
  color: black;
  margin: 15% auto;
  width: 90%;
  max-width: 500px;
  border-radius: 32px;
  max-height: 70%;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid #eee;
}

.close {
  font-size: 32px;
  cursor: pointer;
  color: #999;
}

.history-item {
  padding: 12px;
  border-bottom: 1px solid #eee;
  margin: 8px;
  background: #f9f9f9;
  border-radius: 12px;
}

.btn-clear {
  background: var(--danger);
  margin: 20px;
  width: calc(100% - 40px);
}

.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.7;
}

.empty-state {
  text-align: center;
  padding: 40px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  margin-top: 20px;
}

@media (max-width: 480px) {
  .btn-tomado, .btn-snooze {
    font-size: 18px;
    padding: 12px 25px;
  }
  .med-name {
    font-size: 32px;
    padding: 15px 25px;
  }
}
</style>

</head>
<body>

<!-- TELA DE ALARME -->
<div id="alarmScreen">
  <h1>⏰ HORA DO REMÉDIO</h1>
  <div id="alarmMedName" class="med-name"></div>
  <div class="alarm-buttons">
    <button class="btn-tomado" onclick="stopAlarm()">✅ TOMADO</button>
    <button class="btn-snooze" onclick="snoozeAlarm()">⏰ ADIAR 10min</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div class="container">
  <div class="header">
    <h1>💊 MediAlarme Plus</h1>
    <button class="btn-history" onclick="showHistory()">📋 Histórico</button>
  </div>

  <div class="card">
    <h3>➕ Novo medicamento</h3>
    <input type="text" id="med" placeholder="Nome do medicamento" autocomplete="off">
    <div class="multi-time">
      <input type="time" id="time1">
      <input type="time" id="time2">
      <input type="time" id="time3">
    </div>
    <button class="btn-add" onclick="addAlarm()">➕ Adicionar</button>
  </div>

  <div class="section-title">
    <h3>📋 Seus lembretes</h3>
    <span class="badge" id="alarmCount">0</span>
  </div>
  <div id="list"></div>
  
  <div class="footer">
    <p>🔔 Toca MESMO com tela bloqueada!</p>
    <p>🗣️ Voz automática fala o nome do remédio</p>
  </div>
</div>

<!-- MODAL HISTÓRICO -->
<div id="historyModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📊 Histórico</h2>
      <span class="close" onclick="closeHistory()">&times;</span>
    </div>
    <div id="historyList"></div>
    <button class="btn-clear" onclick="clearHistory()">🗑️ Limpar</button>
  </div>
</div>

<script>
// ========== JAVASCRIPT COMPLETO - TOCA COM TELA BLOQUEADA ==========

let alarms = [];
let history = [];
let activeInterval = null;
let currentAlarmMed = '';
let audioElement = null;
let wakeLock = null;
let ttsInstance = null;

// ========== INICIALIZAÇÃO ==========
document.addEventListener('DOMContentLoaded', async () => {
  console.log('📱 MediAlarme Plus - Iniciado');
  loadData();
  render();
  updateAlarmCount();
  initAudio();
  initTTS();
  startAlarmChecker();
  requestWakeLock();
});

// ========== ÁUDIO QUE TOCA COM TELA BLOQUEADA ==========
function initAudio() {
  // Criar elemento de áudio - funciona em background
  audioElement = new Audio();
  audioElement.loop = true;
  audioElement.volume = 1.0;
  
  // Gerar som de alarme via Web Audio (beep contínuo)
  generateAlarmSound();
}

function generateAlarmSound() {
  // Criar um beep usando AudioContext (gerado dinamicamente)
  try {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContextClass();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.type = 'sine';
    oscillator.frequency.value = 880;
    gainNode.gain.value = 0.5;
    
    // Gravar o som
    const duration = 2;
    const sampleRate = audioCtx.sampleRate;
    const frames = duration * sampleRate;
    const audioBuffer = audioCtx.createBuffer(1, frames, sampleRate);
    const channelData = audioBuffer.getChannelData(0);
    
    for (let i = 0; i < frames; i++) {
      channelData[i] = Math.sin(2 * Math.PI * 880 * i / sampleRate) * 0.5;
    }
    
    // Converter para blob
    const offlineCtx = new OfflineAudioContext(1, frames, sampleRate);
    const bufferSource = offlineCtx.createBufferSource();
    bufferSource.buffer = audioBuffer;
    bufferSource.connect(offlineCtx.destination);
    bufferSource.start();
    
    offlineCtx.startRendering().then(renderedBuffer => {
      const wavBlob = bufferToWave(renderedBuffer, frames * 2);
      const audioUrl = URL.createObjectURL(wavBlob);
      audioElement.src = audioUrl;
    });
  } catch(e) {
    console.log('Erro ao gerar som, usando fallback:', e);
    // Fallback: usar beep via oscillator ao vivo
  }
}

function bufferToWave(abuffer, len) {
  const numOfChan = abuffer.numberOfChannels;
  const length = len * numOfChan * 2;
  const buffer = new ArrayBuffer(44 + length);
  const view = new DataView(buffer);
  const channels = [];
  let offset = 0;
  let pos = 0;
  
  // Write WAV header
  setUint32(0x46464952); // "RIFF"
  setUint32(36 + length); // file length
  setUint32(0x45564157); // "WAVE"
  setUint32(0x20746d66); // "fmt "
  setUint32(16); // fmt chunk size
  setUint16(1); // PCM
  setUint16(numOfChan);
  setUint32(abuffer.sampleRate);
  setUint32(abuffer.sampleRate * 2 * numOfChan);
  setUint16(numOfChan * 2);
  setUint16(16);
  setUint32(0x61746164); // "data"
  setUint32(length);
  
  for (let i = 0; i < abuffer.numberOfChannels; i++)
    channels.push(abuffer.getChannelData(i));
  
  while (pos < len) {
    for (let i = 0; i < numOfChan; i++) {
      let sample = Math.max(-1, Math.min(1, channels[i][pos]));
      sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF) | 0;
      view.setInt16(44 + (offset * 2), sample, true);
      offset++;
    }
    pos++;
  }
  
  function setUint16(data) {
    view.setUint16(44 + offset, data, true);
    offset += 2;
  }
  
  function setUint32(data) {
    view.setUint32(44 + offset, data, true);
    offset += 4;
  }
  
  return new Blob([buffer], { type: 'audio/wav' });
}

// ========== WAKE LOCK - IMPEDE TELA DORMIR ==========
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('✅ Wake Lock ativado - tela não dorme');
      
      // Recriar wake lock se a tela voltar
      document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      });
    } catch(e) {
      console.log('⚠️ Wake Lock não suportado:', e);
    }
  }
}

// ========== TTS (VOZ) ==========
function initTTS() {
  if ('speechSynthesis' in window) {
    ttsInstance = {
      speak: (opts) => {
        const utterance = new SpeechSynthesisUtterance(opts.text);
        utterance.lang = 'pt-BR';
        utterance.rate = opts.rate || 0.9;
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
      }
    };
    console.log('✅ TTS inicializado');
  } else {
    ttsInstance = { speak: () => {} };
  }
}

// ========== VERIFICADOR DE ALARMES ==========
function startAlarmChecker() {
  // Verificar a cada 10 segundos (mais rápido para precisão)
  setInterval(() => {
    checkAlarms();
  }, 10000);
  
  // Verificar também no minuto exato
  const now = new Date();
  const msToNextMinute = (60 - now.getSeconds()) * 1000;
  setTimeout(() => {
    checkAlarms();
    setInterval(() => checkAlarms(), 60000);
  }, msToNextMinute);
}

function checkAlarms() {
  const now = new Date();
  const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  
  for (let alarm of alarms) {
    for (let time of alarm.times) {
      if (time === currentTime) {
        const key = `notified_${alarm.id}_${time}_${now.toDateString()}`;
        if (!localStorage.getItem(key)) {
          console.log(`🔔 ALARME DISPARADO: ${alarm.med} às ${time}`);
          triggerAlarm(alarm.med);
          localStorage.setItem(key, 'true');
          
          // Limpar após 2 minutos
          setTimeout(() => localStorage.removeItem(key), 120000);
        }
      }
    }
  }
}

// ========== DISPARAR ALARME ==========
function triggerAlarm(medName) {
  currentAlarmMed = medName;
  
  // 1. Tocar som (loop contínuo)
  if (audioElement) {
    audioElement.currentTime = 0;
    audioElement.play().catch(e => console.log('Erro ao tocar:', e));
  }
  
  // 2. Vibrar
  if (navigator.vibrate) {
    navigator.vibrate([1000, 500, 1000, 500, 2000]);
    // Continuar vibrando a cada 3 segundos
    const vibrateInterval = setInterval(() => {
      if (document.getElementById('alarmScreen').style.display === 'flex') {
        navigator.vibrate([1000, 500]);
      } else {
        clearInterval(vibrateInterval);
      }
    }, 3000);
  }
  
  // 3. Mostrar tela
  const screen = document.getElementById('alarmScreen');
  const medElement = document.getElementById('alarmMedName');
  medElement.innerText = medName;
  screen.style.display = 'flex';
  
  // 4. Falar
  if (ttsInstance) {
    ttsInstance.speak({
      text: `Dona Graça, hora do remédio ${medName}`,
      rate: 0.9
    });
  }
  
  // 5. Repetir voz a cada 5 segundos
  if (activeInterval) clearInterval(activeInterval);
  activeInterval = setInterval(() => {
    if (screen.style.display === 'flex' && ttsInstance) {
      ttsInstance.speak({
        text: `Dona Graça, tome o remédio ${medName}`,
        rate: 0.9
      });
    }
  }, 5000);
}

// ========== PARAR ALARME ==========
function stopAlarm() {
  // Parar som
  if (audioElement) {
    audioElement.pause();
    audioElement.currentTime = 0;
  }
  
  // Esconder tela
  document.getElementById('alarmScreen').style.display = 'none';
  
  // Parar voz repetida
  if (activeInterval) {
    clearInterval(activeInterval);
    activeInterval = null;
  }
  
  // Parar vibração
  if (navigator.vibrate) navigator.vibrate(0);
  
  // Registrar histórico
  if (currentAlarmMed) {
    history.unshift({
      id: Date.now(),
      med: currentAlarmMed,
      time: new Date().toLocaleString('pt-BR'),
      status: '✅ Tomado'
    });
    if (history.length > 100) history.pop();
    saveData();
    currentAlarmMed = '';
  }
}

// ========== SNOOZE ==========
function snoozeAlarm() {
  // Parar som
  if (audioElement) {
    audioElement.pause();
    audioElement.currentTime = 0;
  }
  
  document.getElementById('alarmScreen').style.display = 'none';
  
  if (activeInterval) {
    clearInterval(activeInterval);
    activeInterval = null;
  }
  
  if (currentAlarmMed) {
    history.unshift({
      id: Date.now(),
      med: currentAlarmMed,
      time: new Date().toLocaleString('pt-BR'),
      status: '⏰ Adiado 10min'
    });
    saveData();
    
    // Reagendar em 10 minutos
    setTimeout(() => {
      triggerAlarm(currentAlarmMed);
    }, 600000);
  }
  
  if (navigator.vibrate) navigator.vibrate(0);
}

// ========== CRUD ALARMES ==========
function addAlarm() {
  const med = document.getElementById('med').value.trim();
  const times = [];
  for(let i = 1; i <= 3; i++) {
    const time = document.getElementById(`time${i}`).value;
    if(time) times.push(time);
  }
  
  if(!med || times.length === 0) {
    alert('⚠️ Preencha o medicamento e pelo menos 1 horário');
    return;
  }
  
  alarms.push({
    id: Date.now(),
    med: med,
    times: times
  });
  
  saveData();
  render();
  updateAlarmCount();
  
  // Limpar campos
  document.getElementById('med').value = '';
  for(let i = 1; i <= 3; i++) {
    document.getElementById(`time${i}`).value = '';
  }
}

function removeAlarm(id) {
  if (!confirm('Remover este lembrete?')) return;
  alarms = alarms.filter(a => a.id !== id);
  saveData();
  render();
  updateAlarmCount();
}

function render() {
  const listDiv = document.getElementById('list');
  if(alarms.length === 0) {
    listDiv.innerHTML = '<div class="empty-state">✨ Nenhum lembrete cadastrado</div>';
    return;
  }
  
  listDiv.innerHTML = alarms.map(a => `
    <div>
      <div class="alarm-item">
        <div class="alarm-info">
          <strong>💊 ${escapeHtml(a.med)}</strong>
          <div class="alarm-times">⏰ ${a.times.join(' • ')}</div>
        </div>
        <button class="delete" onclick="removeAlarm(${a.id})">❌</button>
      </div>
    </div>
  `).join('');
}

function updateAlarmCount() {
  document.getElementById('alarmCount').textContent = alarms.length;
}

// ========== HISTÓRICO ==========
function showHistory() {
  const modal = document.getElementById('historyModal');
  const historyDiv = document.getElementById('historyList');
  
  if(history.length === 0) {
    historyDiv.innerHTML = '<div class="empty-state">📭 Nenhum registro</div>';
  } else {
    historyDiv.innerHTML = history.slice(0, 50).map(h => `
      <div class="history-item">
        <strong>💊 ${escapeHtml(h.med)}</strong><br>
        📅 ${h.time}<br>
        ${h.status}
      </div>
    `).join('');
  }
  modal.style.display = 'block';
}

function closeHistory() {
  document.getElementById('historyModal').style.display = 'none';
}

function clearHistory() {
  if (!confirm('Limpar histórico?')) return;
  history = [];
  saveData();
  showHistory();
}

// ========== UTILIDADES ==========
function loadData() {
  const savedAlarms = localStorage.getItem('alarms_plus_v2');
  const savedHistory = localStorage.getItem('history_plus_v2');
  alarms = savedAlarms ? JSON.parse(savedAlarms) : [];
  history = savedHistory ? JSON.parse(savedHistory) : [];
}

function saveData() {
  localStorage.setItem('alarms_plus_v2', JSON.stringify(alarms));
  localStorage.setItem('history_plus_v2', JSON.stringify(history));
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ========== TESTE MANUAL ==========
function testAlarm() {
  triggerAlarm('TESTE - Hora do remédio');
}

// Expor funções
window.addAlarm = addAlarm;
window.removeAlarm = removeAlarm;
window.stopAlarm = stopAlarm;
window.snoozeAlarm = snoozeAlarm;
window.showHistory = showHistory;
window.closeHistory = closeHistory;
window.clearHistory = clearHistory;
window.testAlarm = testAlarm;

console.log('✅ App pronto! Use testAlarm() para testar');
console.log('🎵 O som vai tocar mesmo com tela bloqueada!');
</script>

</body>
</html>
