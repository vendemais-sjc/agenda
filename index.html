<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MediAlarme Plus - Saúde Completa</title>

<style>
/* ========== CSS COMPLETO ========== */
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary: #667eea;
  --primary-dark: #764ba2;
  --success: #22c55e;
  --danger: #dc2626;
  --warning: #f59e0b;
  --info: #3b82f6;
  --consult: #8b5cf6;
}

body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  margin: 0;
  min-height: 100vh;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
  padding-bottom: 80px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  background: rgba(255,255,255,0.1);
  border-radius: 60px;
  padding: 5px;
}

.tab-btn {
  flex: 1;
  padding: 12px;
  background: transparent;
  color: white;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
}

.tab-btn.active {
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(5px);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.header h1 {
  margin: 0;
  font-size: 1.5rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.btn-history {
  background: rgba(255,255,255,0.2);
  padding: 8px 15px;
  font-size: 13px;
  width: auto;
  border-radius: 40px;
  border: none;
  color: white;
  cursor: pointer;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.card h3 {
  margin-top: 0;
  margin-bottom: 15px;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 20px;
  border: none;
  font-size: 15px;
  font-weight: bold;
}

input, select {
  background: white;
  text-align: center;
  color: #1f2937;
}

input:focus, select:focus {
  outline: none;
  transform: scale(1.02);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
}

.med-type {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.med-type label {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 20px;
  cursor: pointer;
}

.med-type input {
  width: auto;
  margin: 0;
}

button {
  background: var(--success);
  color: white;
  cursor: pointer;
  transition: transform 0.1s;
}

button:active {
  transform: scale(0.97);
}

.btn-add {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  font-size: 16px;
  margin-top: 15px;
}

.btn-consult {
  background: linear-gradient(135deg, var(--consult), #6d28d9);
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 20px 0 10px;
}

.badge {
  background: rgba(255,255,255,0.3);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: bold;
}

#medList, #consultList {
  margin-top: 5px;
}

.med-item, .consult-item {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(5px);
  padding: 14px;
  border-radius: 20px;
  margin-top: 10px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.item-info {
  flex: 1;
}

.item-info strong {
  font-size: 16px;
  display: block;
}

.item-detail {
  font-size: 12px;
  opacity: 0.9;
  margin-top: 4px;
}

.delete {
  background: var(--danger);
  padding: 6px 14px;
  border-radius: 40px;
  font-size: 12px;
  width: auto;
}

.type-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  margin-left: 8px;
}

.type-continua { background: var(--success); }
.type-mensal { background: var(--warning); color: #333; }
.type-eventual { background: var(--info); }

/* TELA DE ALARME */
#alarmScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #a8edea, #fed6e3);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  text-align: center;
  animation: softPulse 1s infinite;
}

@keyframes softPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.97; }
}

#alarmScreen h1 {
  font-size: 36px;
  margin-bottom: 20px;
  color: #333;
}

.alarm-type {
  font-size: 18px;
  color: #666;
  margin-bottom: 10px;
}

.med-name {
  font-size: 40px;
  font-weight: bold;
  background: white;
  color: #333;
  padding: 20px 35px;
  border-radius: 60px;
  margin: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.alarm-buttons {
  display: flex;
  gap: 15px;
  margin-top: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-tomado, .btn-snooze, .btn-whatsapp {
  font-size: 18px;
  padding: 12px 25px;
  width: auto;
}

.btn-tomado { background: var(--success); }
.btn-snooze { background: var(--warning); }
.btn-whatsapp { background: #25D366; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 10000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(5px);
}

.modal-content {
  background: white;
  color: black;
  margin: 10% auto;
  width: 90%;
  max-width: 500px;
  border-radius: 32px;
  max-height: 80%;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  border-bottom: 1px solid #eee;
}

.close {
  font-size: 28px;
  cursor: pointer;
  color: #999;
}

.history-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  margin: 5px;
  background: #f9f9f9;
  border-radius: 12px;
}

.btn-clear {
  background: var(--danger);
  margin: 15px;
  width: calc(100% - 30px);
}

.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 11px;
  opacity: 0.7;
}

.empty-state {
  text-align: center;
  padding: 30px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  margin-top: 15px;
}

@media (max-width: 480px) {
  .btn-tomado, .btn-snooze, .btn-whatsapp {
    font-size: 14px;
    padding: 10px 18px;
  }
  .med-name {
    font-size: 28px;
    padding: 12px 20px;
  }
  #alarmScreen h1 {
    font-size: 28px;
  }
}

.alarm-indicator {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #ff4444;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  animation: blink 1s infinite;
  display: none;
  z-index: 1000;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>

</head>
<body>

<div class="alarm-indicator" id="alarmIndicator"></div>

<!-- TELA DE ALARME -->
<div id="alarmScreen">
  <h1>⏰ HORA DO COMPROMISSO</h1>
  <div class="alarm-type" id="alarmType"></div>
  <div id="alarmMedName" class="med-name"></div>
  <div class="alarm-buttons">
    <button class="btn-tomado" onclick="stopAlarm()">✅ CONFIRMAR</button>
    <button class="btn-snooze" onclick="snoozeAlarm()">⏰ ADIAR 10min</button>
    <button class="btn-whatsapp" onclick="sendWhatsApp()">📱 ENVIAR LEMBRETE</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div class="container">
  <div class="header">
    <h1>💊 MediAlarme Plus</h1>
    <button class="btn-history" onclick="showHistory()">📋 Histórico</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('medicamentos')">💊 Medicamentos</button>
    <button class="tab-btn" onclick="switchTab('consultas')">🏥 Consultas</button>
  </div>

  <!-- TAB MEDICAMENTOS -->
  <div id="medicamentosTab" class="tab-content active">
    <div class="card">
      <h3>➕ Novo medicamento</h3>
      <input type="text" id="medName" placeholder="Nome do medicamento" autocomplete="off">
      
      <div class="multi-time">
        <input type="time" id="medTime1" placeholder="Horário 1">
        <input type="time" id="medTime2" placeholder="Horário 2">
        <input type="time" id="medTime3" placeholder="Horário 3">
      </div>
      
      <div class="med-type">
        <label>
          <input type="radio" name="medType" value="continua" checked> 🔄 Contínuo
        </label>
        <label>
          <input type="radio" name="medType" value="mensal"> 📅 Mensal
        </label>
        <label>
          <input type="radio" name="medType" value="eventual"> ⏰ Eventual
        </label>
      </div>
      
      <button class="btn-add" onclick="addMedicamento()">➕ Adicionar medicamento</button>
    </div>

    <div class="section-title">
      <h3>📋 Medicamentos</h3>
      <span class="badge" id="medCount">0</span>
    </div>
    <div id="medList"></div>
  </div>

  <!-- TAB CONSULTAS -->
  <div id="consultasTab" class="tab-content">
    <div class="card">
      <h3>🏥 Nova consulta</h3>
      <input type="text" id="consultName" placeholder="Tipo da consulta (ex: Cardiologista)" autocomplete="off">
      <input type="datetime-local" id="consultDateTime">
      <input type="text" id="consultLocal" placeholder="Local / Endereço">
      <input type="text" id="consultDoctor" placeholder="Nome do médico (opcional)">
      
      <button class="btn-add btn-consult" onclick="addConsulta()">➕ Agendar consulta</button>
    </div>

    <div class="section-title">
      <h3>📅 Próximas consultas</h3>
      <span class="badge" id="consultCount">0</span>
    </div>
    <div id="consultList"></div>
  </div>
  
  <div class="footer">
    <p>🔔 Sino suave | 📱 WhatsApp com áudio e texto | 🏥 Lembretes 24h/12h/6h/2h antes</p>
  </div>
</div>

<!-- MODAL HISTÓRICO -->
<div id="historyModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📊 Histórico</h2>
      <span class="close" onclick="closeHistory()">&times;</span>
    </div>
    <div id="historyList"></div>
    <button class="btn-clear" onclick="clearHistory()">🗑️ Limpar histórico</button>
  </div>
</div>

<script>
// ========== MEDI ALARME PLUS - VERSÃO COMPLETA ==========

let medicamentos = [];
let consultas = [];
let history = [];
let currentAlarm = null;
let isAlarmActive = false;

// Áudio suave
let audioContext = null;
let isPlaying = false;
let vibrationInterval = null;
let ttsInstance = null;
let wakeLock = null;

// Número WhatsApp
const WHATSAPP_NUMBER = "5512988461978";

// ========== INICIALIZAÇÃO ==========
document.addEventListener('DOMContentLoaded', async () => {
  console.log('📱 MediAlarme Plus - Iniciado');
  loadData();
  renderAll();
  initTTS();
  initAudio();
  startAlarmChecker();
  requestWakeLock();
  
  // Verificar consultas próximas a cada hora
  setInterval(() => checkProximasConsultas(), 60000);
  checkProximasConsultas();
  
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && isAlarmActive && currentAlarm) {
      speakAlarmMessage();
    }
  });
});

// ========== ÁUDIO SUAVE (SINO) ==========
function initAudio() {
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {
    console.log('Erro ao inicializar áudio:', e);
  }
}

function playGentleSound() {
  if (!audioContext || isPlaying) return;
  
  try {
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    
    // Som de sino suave (frequência mais agradável)
    const playChime = () => {
      if (!isAlarmActive) return;
      
      const now = audioContext.currentTime;
      const gainNode = audioContext.createGain();
      gainNode.gain.value = 0.4;
      gainNode.connect(audioContext.destination);
      
      // Primeiro tom (Dó)
      const osc1 = audioContext.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.value = 523.25; // Dó
      osc1.connect(gainNode);
      osc1.start();
      osc1.stop(now + 0.3);
      
      // Segundo tom (Mi)
      setTimeout(() => {
        if (!isAlarmActive) return;
        const osc2 = audioContext.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = 659.25; // Mi
        osc2.connect(gainNode);
        osc2.start();
        osc2.stop(now + 0.6);
      }, 150);
      
      // Terceiro tom (Sol)
      setTimeout(() => {
        if (!isAlarmActive) return;
        const osc3 = audioContext.createOscillator();
        osc3.type = 'sine';
        osc3.frequency.value = 783.99; // Sol
        osc3.connect(gainNode);
        osc3.start();
        osc3.stop(now + 0.9);
      }, 300);
      
      // Repetir a cada 4 segundos
      setTimeout(() => {
        if (isAlarmActive) playChime();
      }, 4000);
    };
    
    playChime();
    isPlaying = true;
  } catch(e) {
    console.log('Erro no som:', e);
  }
}

function stopSound() {
  isPlaying = false;
}

// ========== VIBRAÇÃO SUAVE ==========
function startGentleVibration() {
  if (vibrationInterval) clearInterval(vibrationInterval);
  
  const vibrate = () => {
    if (isAlarmActive && navigator.vibrate) {
      navigator.vibrate([300, 200, 300]);
    }
  };
  
  vibrate();
  vibrationInterval = setInterval(vibrate, 4000);
}

function stopVibration() {
  if (vibrationInterval) {
    clearInterval(vibrationInterval);
    vibrationInterval = null;
  }
  if (navigator.vibrate) navigator.vibrate(0);
}

// ========== TTS ==========
function initTTS() {
  if ('speechSynthesis' in window) {
    ttsInstance = { speak: (text) => {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'pt-BR';
      utterance.rate = 0.9;
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }};
  }
}

function speakAlarmMessage() {
  if (ttsInstance && currentAlarm && isAlarmActive) {
    let message = '';
    if (currentAlarm.type === 'medicamento') {
      message = `Dona Graça, hora do medicamento ${currentAlarm.name}`;
    } else {
      message = `Dona Graça, lembrete da consulta ${currentAlarm.name} em ${currentAlarm.local}`;
    }
    ttsInstance.speak(message);
  }
}

// ========== ENVIAR WHATSAPP ==========
function sendWhatsApp() {
  if (!currentAlarm) return;
  
  let message = '';
  if (currentAlarm.type === 'medicamento') {
    message = `🔔 *LEMBRETE DE MEDICAMENTO* 🔔\n\n💊 *Medicamento:* ${currentAlarm.name}\n⏰ *Horário:* ${new Date().toLocaleString('pt-BR')}\n✅ *Status:* Pendente de confirmação\n\nPor favor, tome o medicamento conforme orientação médica.`;
  } else {
    message = `🏥 *LEMBRETE DE CONSUTA* 🏥\n\n📋 *Tipo:* ${currentAlarm.name}\n📍 *Local:* ${currentAlarm.local}\n👨‍⚕️ *Médico:* ${currentAlarm.doctor || 'Não informado'}\n⏰ *Data/Hora:* ${currentAlarm.datetime}\n\n🔔 Este é um lembrete automático do MediAlarme Plus.`;
  }
  
  // Codificar mensagem para URL
  const encodedMessage = encodeURIComponent(message);
  const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`;
  
  // Abrir WhatsApp
  window.open(whatsappUrl, '_blank');
  
  // Tentar também enviar áudio (simulado - WhatsApp Web não suporta áudio direto)
  console.log('📱 Mensagem WhatsApp enviada:', message);
  
  // Registrar no histórico
  history.unshift({
    id: Date.now(),
    type: 'whatsapp',
    med: currentAlarm.name,
    time: new Date().toLocaleString('pt-BR'),
    status: '📱 Lembrete enviado via WhatsApp'
  });
  saveData();
}

// ========== WAKE LOCK ==========
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (wakeLock && document.visibilityState === 'visible') {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      });
    } catch(e) {}
  }
}

// ========== VERIFICADOR DE ALARMES ==========
function startAlarmChecker() {
  setInterval(() => {
    checkMedicamentos();
  }, 10000);
  
  const now = new Date();
  const msToNextMinute = (60 - now.getSeconds()) * 1000;
  setTimeout(() => {
    checkMedicamentos();
    setInterval(() => checkMedicamentos(), 60000);
  }, msToNextMinute);
}

function checkMedicamentos() {
  const now = new Date();
  const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  const currentDate = now.toDateString();
  const currentDay = now.getDate();
  
  for (let med of medicamentos) {
    // Verificar tipo de frequência
    let shouldNotify = false;
    
    if (med.frequencia === 'continua') {
      shouldNotify = true;
    } else if (med.frequencia === 'mensal') {
      // Verificar se é o dia do mês (considerando o dia do cadastro)
      const medDay = new Date(med.createdAt).getDate();
      if (currentDay === medDay) shouldNotify = true;
    } else if (med.frequencia === 'eventual') {
      // Verificar se ainda não foi tomado hoje
      const key = `eventual_${med.id}_${currentDate}`;
      if (!localStorage.getItem(key)) shouldNotify = true;
    }
    
    if (shouldNotify) {
      for (let time of med.times) {
        if (time === currentTime) {
          const key = `notified_${med.id}_${time}_${currentDate}`;
          if (!localStorage.getItem(key)) {
            triggerAlarm('medicamento', med.name, med);
            localStorage.setItem(key, 'true');
            setTimeout(() => localStorage.removeItem(key), 180000);
          }
        }
      }
    }
  }
}

function checkProximasConsultas() {
  const now = new Date();
  
  for (let consulta of consultas) {
    const consultaDate = new Date(consulta.datetime);
    const diffMs = consultaDate - now;
    const diffHours = diffMs / (1000 * 60 * 60);
    
    // Verificar lembretes: 24h, 12h, 6h, 2h antes
    const reminders = [
      { hours: 24, key: 'reminder_24h' },
      { hours: 12, key: 'reminder_12h' },
      { hours: 6, key: 'reminder_6h' },
      { hours: 2, key: 'reminder_2h' }
    ];
    
    for (let r of reminders) {
      if (diffHours <= r.hours && diffHours > r.hours - 1) {
        const key = `${r.key}_${consulta.id}_${consultaDate.toDateString()}`;
        if (!localStorage.getItem(key)) {
          triggerAlarm('consulta', consulta.name, consulta);
          localStorage.setItem(key, 'true');
          
          // Enviar WhatsApp automaticamente para consultas
          sendConsultaWhatsApp(consulta, r.hours);
        }
      }
    }
  }
}

function sendConsultaWhatsApp(consulta, hoursBefore) {
  const message = `🏥 *LEMBRETE DE CONSUTA* 🏥\n\n📋 *Tipo:* ${consulta.name}\n📍 *Local:* ${consulta.local}\n👨‍⚕️ *Médico:* ${consulta.doctor || 'Não informado'}\n⏰ *Data/Hora:* ${consulta.datetime}\n🔔 *Aviso:* ${hoursBefore} horas antes\n\nPor favor, não esqueça do seu compromisso!`;
  
  const encodedMessage = encodeURIComponent(message);
  const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`;
  window.open(whatsappUrl, '_blank');
}

// ========== DISPARAR ALARME ==========
function triggerAlarm(type, name, data) {
  if (isAlarmActive) return;
  
  currentAlarm = {
    type: type,
    name: name,
    local: data.local || '',
    doctor: data.doctor || '',
    datetime: data.datetime || '',
    data: data
  };
  
  isAlarmActive = true;
  
  document.getElementById('alarmIndicator').style.display = 'block';
  document.getElementById('alarmType').innerHTML = type === 'medicamento' ? '💊 MEDICAMENTO' : '🏥 CONSUTA MÉDICA';
  document.getElementById('alarmMedName').innerHTML = name;
  document.getElementById('alarmScreen').style.display = 'flex';
  
  playGentleSound();
  startGentleVibration();
  
  if (document.visibilityState === 'visible') {
    speakAlarmMessage();
  }
}

// ========== PARAR ALARME ==========
function stopAlarm() {
  if (!isAlarmActive) return;
  
  stopSound();
  stopVibration();
  document.getElementById('alarmScreen').style.display = 'none';
  document.getElementById('alarmIndicator').style.display = 'none';
  
  if (currentAlarm) {
    history.unshift({
      id: Date.now(),
      type: currentAlarm.type,
      med: currentAlarm.name,
      time: new Date().toLocaleString('pt-BR'),
      status: '✅ Confirmado'
    });
    saveData();
    
    // Se for eventual, marcar como tomado
    if (currentAlarm.type === 'medicamento' && currentAlarm.data.frequencia === 'eventual') {
      const today = new Date().toDateString();
      localStorage.setItem(`eventual_${currentAlarm.data.id}_${today}`, 'true');
    }
  }
  
  isAlarmActive = false;
  currentAlarm = null;
}

// ========== SNOOZE ==========
function snoozeAlarm() {
  if (!isAlarmActive) return;
  
  stopSound();
  stopVibration();
  document.getElementById('alarmScreen').style.display = 'none';
  document.getElementById('alarmIndicator').style.display = 'none';
  
  const snoozeMed = currentAlarm;
  isAlarmActive = false;
  
  history.unshift({
    id: Date.now(),
    type: snoozeMed.type,
    med: snoozeMed.name,
    time: new Date().toLocaleString('pt-BR'),
    status: '⏰ Adiado 10min'
  });
  saveData();
  
  setTimeout(() => {
    triggerAlarm(snoozeMed.type, snoozeMed.name, snoozeMed.data);
  }, 600000);
  
  currentAlarm = null;
}

// ========== CRUD MEDICAMENTOS ==========
function addMedicamento() {
  const name = document.getElementById('medName').value.trim();
  const times = [];
  for(let i = 1; i <= 3; i++) {
    const time = document.getElementById(`medTime${i}`).value;
    if(time) times.push(time);
  }
  
  const frequencia = document.querySelector('input[name="medType"]:checked').value;
  
  if(!name || times.length === 0) {
    alert('⚠️ Preencha o nome e pelo menos 1 horário');
    return;
  }
  
  medicamentos.push({
    id: Date.now(),
    name: name,
    times: times,
    frequencia: frequencia,
    createdAt: new Date().toISOString()
  });
  
  saveData();
  renderMedicamentos();
  updateCounts();
  
  document.getElementById('medName').value = '';
  for(let i = 1; i <= 3; i++) {
    document.getElementById(`medTime${i}`).value = '';
  }
}

function removeMedicamento(id) {
  if (!confirm('Remover este medicamento?')) return;
  medicamentos = medicamentos.filter(m => m.id !== id);
  saveData();
  renderMedicamentos();
  updateCounts();
}

// ========== CRUD CONSULTAS ==========
function addConsulta() {
  const name = document.getElementById('consultName').value.trim();
  const datetime = document.getElementById('consultDateTime').value;
  const local = document.getElementById('consultLocal').value.trim();
  const doctor = document.getElementById('consultDoctor').value.trim();
  
  if(!name || !datetime || !local) {
    alert('⚠️ Preencha todos os campos obrigatórios');
    return;
  }
  
  consultas.push({
    id: Date.now(),
    name: name,
    datetime: datetime,
    local: local,
    doctor: doctor,
    createdAt: new Date().toISOString()
  });
  
  // Ordenar por data
  consultas.sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
  
  saveData();
  renderConsultas();
  updateCounts();
  
  document.getElementById('consultName').value = '';
  document.getElementById('consultDateTime').value = '';
  document.getElementById('consultLocal').value = '';
  document.getElementById('consultDoctor').value = '';
}

function removeConsulta(id) {
  if (!confirm('Remover esta consulta?')) return;
  consultas = consultas.filter(c => c.id !== id);
  saveData();
  renderConsultas();
  updateCounts();
}

// ========== RENDERIZAÇÃO ==========
function renderMedicamentos() {
  const container = document.getElementById('medList');
  if(medicamentos.length === 0) {
    container.innerHTML = '<div class="empty-state">✨ Nenhum medicamento cadastrado</div>';
    return;
  }
  
  const freqText = { continua: '🔄 Contínuo', mensal: '📅 Mensal', eventual: '⏰ Eventual' };
  
  container.innerHTML = medicamentos.map(m => `
    <div class="med-item">
      <div class="item-header">
        <div class="item-info">
          <strong>💊 ${escapeHtml(m.name)} <span class="type-badge type-${m.frequencia}">${freqText[m.frequencia]}</span></strong>
          <div class="item-detail">⏰ ${m.times.join(' • ')}</div>
        </div>
        <button class="delete" onclick="removeMedicamento(${m.id})">❌</button>
      </div>
    </div>
  `).join('');
}

function renderConsultas() {
  const container = document.getElementById('consultList');
  if(consultas.length === 0) {
    container.innerHTML = '<div class="empty-state">📅 Nenhuma consulta agendada</div>';
    return;
  }
  
  container.innerHTML = consultas.map(c => {
    const consultaDate = new Date(c.datetime);
    const now = new Date();
    const isPast = consultaDate < now;
    
    return `
      <div class="consult-item" style="${isPast ? 'opacity: 0.6;' : ''}">
        <div class="item-header">
          <div class="item-info">
            <strong>🏥 ${escapeHtml(c.name)}</strong>
            <div class="item-detail">📅 ${formatDateTime(c.datetime)}</div>
            <div class="item-detail">📍 ${escapeHtml(c.local)}</div>
            ${c.doctor ? `<div class="item-detail">👨‍⚕️ ${escapeHtml(c.doctor)}</div>` : ''}
          </div>
          <button class="delete" onclick="removeConsulta(${c.id})">❌</button>
        </div>
      </div>
    `;
  }).join('');
}

function formatDateTime(datetime) {
  const date = new Date(datetime);
  return date.toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function renderAll() {
  renderMedicamentos();
  renderConsultas();
}

function updateCounts() {
  document.getElementById('medCount').textContent = medicamentos.length;
  document.getElementById('consultCount').textContent = consultas.length;
}

// ========== HISTÓRICO ==========
function showHistory() {
  const modal = document.getElementById('historyModal');
  const historyDiv = document.getElementById('historyList');
  
  if(history.length === 0) {
    historyDiv.innerHTML = '<div class="empty-state">📭 Nenhum registro</div>';
  } else {
    historyDiv.innerHTML = history.slice(0, 50).map(h => `
      <div class="history-item">
        <strong>${h.type === 'medicamento' ? '💊' : '🏥'} ${escapeHtml(h.med)}</strong><br>
        📅 ${h.time}<br>
        ${h.status}
      </div>
    `).join('');
  }
  modal.style.display = 'block';
}

function closeHistory() {
  document.getElementById('historyModal').style.display = 'none';
}

function clearHistory() {
  if (!confirm('Limpar histórico?')) return;
  history = [];
  saveData();
  showHistory();
}

// ========== UTILIDADES ==========
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById(`${tab}Tab`).classList.add('active');
  event.target.classList.add('active');
}

function loadData() {
  const savedMeds = localStorage.getItem('medicamentos_v3');
  const savedConsults = localStorage.getItem('consultas_v3');
  const savedHistory = localStorage.getItem('history_v3');
  
  medicamentos = savedMeds ? JSON.parse(savedMeds) : [];
  consultas = savedConsults ? JSON.parse(savedConsults) : [];
  history = savedHistory ? JSON.parse(savedHistory) : [];
}

function saveData() {
  localStorage.setItem('medicamentos_v3', JSON.stringify(medicamentos));
  localStorage.setItem('consultas_v3', JSON.stringify(consultas));
  localStorage.setItem('history_v3', JSON.stringify(history));
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ========== EXPORTAR ==========
window.addMedicamento = addMedicamento;
window.removeMedicamento = removeMedicamento;
window.addConsulta = addConsulta;
window.removeConsulta = removeConsulta;
window.stopAlarm = stopAlarm;
window.snoozeAlarm = snoozeAlarm;
window.sendWhatsApp = sendWhatsApp;
window.showHistory = showHistory;
window.closeHistory = closeHistory;
window.clearHistory = clearHistory;
window.switchTab = switchTab;
