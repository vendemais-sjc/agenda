<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MediAlarme Plus - Bip + Vibração</title>

<style>
/* ========== CSS COMPLETO ========== */
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary: #667eea;
  --primary-dark: #764ba2;
  --success: #22c55e;
  --danger: #dc2626;
  --warning: #f59e0b;
}

body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  margin: 0;
  min-height: 100vh;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
  padding-bottom: 80px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.header h1 {
  margin: 0;
  font-size: 1.8rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.btn-history {
  background: rgba(255,255,255,0.2);
  padding: 10px 18px;
  font-size: 14px;
  width: auto;
  border-radius: 40px;
  backdrop-filter: blur(5px);
  border: none;
  color: white;
  cursor: pointer;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.card h3 {
  margin-top: 0;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
  font-weight: bold;
}

input {
  background: white;
  text-align: center;
  color: #1f2937;
}

input:focus {
  outline: none;
  transform: scale(1.02);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
}

.multi-time {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.multi-time input {
  flex: 1;
  padding: 12px;
  font-size: 14px;
  min-width: 80px;
}

button {
  background: var(--success);
  color: white;
  cursor: pointer;
  transition: transform 0.1s;
}

button:active {
  transform: scale(0.97);
}

.btn-add {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  font-size: 18px;
  margin-top: 20px;
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 20px 0 10px;
}

.badge {
  background: rgba(255,255,255,0.3);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
}

#list > div {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(5px);
  padding: 16px;
  border-radius: 20px;
  margin-top: 12px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.alarm-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.alarm-info {
  flex: 1;
}

.alarm-info strong {
  font-size: 18px;
  display: block;
}

.alarm-times {
  font-size: 13px;
  opacity: 0.9;
  margin-top: 5px;
}

.delete {
  background: var(--danger);
  padding: 8px 18px;
  border-radius: 40px;
  font-size: 14px;
  width: auto;
}

/* TELA DE ALARME */
#alarmScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  text-align: center;
  animation: pulse 0.8s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.95; background: linear-gradient(135deg, #ee5a24, #ff6b6b); }
}

#alarmScreen h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

.med-name {
  font-size: 48px;
  font-weight: bold;
  background: white;
  color: black;
  padding: 25px 40px;
  border-radius: 80px;
  margin: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.alarm-buttons {
  display: flex;
  gap: 20px;
  margin-top: 40px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-tomado, .btn-snooze {
  font-size: 24px;
  padding: 15px 35px;
  width: auto;
}

.btn-tomado { background: var(--success); }
.btn-snooze { background: var(--warning); }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 10000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(5px);
}

.modal-content {
  background: white;
  color: black;
  margin: 15% auto;
  width: 90%;
  max-width: 500px;
  border-radius: 32px;
  max-height: 70%;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid #eee;
}

.close {
  font-size: 32px;
  cursor: pointer;
  color: #999;
}

.history-item {
  padding: 12px;
  border-bottom: 1px solid #eee;
  margin: 8px;
  background: #f9f9f9;
  border-radius: 12px;
}

.btn-clear {
  background: var(--danger);
  margin: 20px;
  width: calc(100% - 40px);
}

.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.7;
}

.empty-state {
  text-align: center;
  padding: 40px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  margin-top: 20px;
}

@media (max-width: 480px) {
  .btn-tomado, .btn-snooze {
    font-size: 18px;
    padding: 12px 25px;
  }
  .med-name {
    font-size: 32px;
    padding: 15px 25px;
  }
}

/* Indicador de alarme ativo */
.alarm-indicator {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #ff4444;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  animation: blink 1s infinite;
  display: none;
  z-index: 1000;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>

</head>
<body>

<div class="alarm-indicator" id="alarmIndicator"></div>

<!-- TELA DE ALARME -->
<div id="alarmScreen">
  <h1>⏰ HORA DO REMÉDIO</h1>
  <div id="alarmMedName" class="med-name"></div>
  <div class="alarm-buttons">
    <button class="btn-tomado" onclick="stopAlarm()">✅ TOMADO</button>
    <button class="btn-snooze" onclick="snoozeAlarm()">⏰ ADIAR 10min</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div class="container">
  <div class="header">
    <h1>💊 MediAlarme Plus</h1>
    <button class="btn-history" onclick="showHistory()">📋 Histórico</button>
  </div>

  <div class="card">
    <h3>➕ Novo medicamento</h3>
    <input type="text" id="med" placeholder="Nome do medicamento" autocomplete="off">
    <div class="multi-time">
      <input type="time" id="time1">
      <input type="time" id="time2">
      <input type="time" id="time3">
    </div>
    <button class="btn-add" onclick="addAlarm()">➕ Adicionar</button>
  </div>

  <div class="section-title">
    <h3>📋 Seus lembretes</h3>
    <span class="badge" id="alarmCount">0</span>
  </div>
  <div id="list"></div>
  
  <div class="footer">
    <p>🔔 Bip + Vibração contínua até você abrir a tela</p>
    <p>🗣️ Voz só fala quando a tela é aberta</p>
  </div>
</div>

<!-- MODAL HISTÓRICO -->
<div id="historyModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📊 Histórico</h2>
      <span class="close" onclick="closeHistory()">&times;</span>
    </div>
    <div id="historyList"></div>
    <button class="btn-clear" onclick="clearHistory()">🗑️ Limpar</button>
  </div>
</div>

<script>
// ========== MEDI ALARME PLUS - BIP + VIBRAÇÃO CONTÍNUA ==========
// ========== Voz SÓ QUANDO ABRE A TELA ==========

let alarms = [];
let history = [];
let currentAlarmMed = '';
let isAlarmActive = false;

// Áudio
let audioContext = null;
let audioSource = null;
let audioGain = null;
let isPlaying = false;

// Vibração
let vibrationInterval = null;

// Wake Lock
let wakeLock = null;

// TTS
let ttsInstance = null;

// ========== INICIALIZAÇÃO ==========
document.addEventListener('DOMContentLoaded', async () => {
  console.log('📱 MediAlarme Plus - Iniciado');
  loadData();
  render();
  updateAlarmCount();
  initTTS();
  initAudio();
  startAlarmChecker();
  requestWakeLock();
  
  // Listener para quando a tela for aberta (visível)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && isAlarmActive) {
      // Quando o usuário abrir a tela, fala o nome do remédio
      speakMedicationName();
    }
  });
});

// ========== ÁUDIO (BIP CONTÍNUO) ==========
function initAudio() {
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    audioGain = audioContext.createGain();
    audioGain.gain.value = 0.8;
    audioGain.connect(audioContext.destination);
  } catch(e) {
    console.log('Erro ao inicializar áudio:', e);
  }
}

function startBeep() {
  if (!audioContext || isPlaying) return;
  
  try {
    // Reativar o AudioContext se estiver suspenso
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    
    // Criar oscilador para o bip
    const oscillator = audioContext.createOscillator();
    oscillator.type = 'sine';
    oscillator.frequency.value = 880; // Frequência do bip
    
    // Conectar
    oscillator.connect(audioGain);
    
    // Iniciar
    oscillator.start();
    
    // Parar após 0.5 segundos e repetir
    const playBeep = () => {
      if (!isAlarmActive) return;
      
      const newOsc = audioContext.createOscillator();
      newOsc.type = 'sine';
      newOsc.frequency.value = 880;
      newOsc.connect(audioGain);
      newOsc.start();
      
      setTimeout(() => {
        newOsc.stop();
        if (isAlarmActive) {
          setTimeout(playBeep, 500); // Pausa de 500ms entre bips
        }
      }, 300);
    };
    
    playBeep();
    isPlaying = true;
    
  } catch(e) {
    console.log('Erro no beep:', e);
  }
}

function stopBeep() {
  isPlaying = false;
  // O áudio para naturalmente quando isAlarmActive for false
}

// ========== VIBRAÇÃO CONTÍNUA ==========
function startVibration() {
  if (vibrationInterval) clearInterval(vibrationInterval);
  
  // Vibração contínua (padrão: vibra 1s, pausa 0.5s)
  const vibratePattern = () => {
    if (isAlarmActive && navigator.vibrate) {
      navigator.vibrate([1000, 500]);
    }
  };
  
  vibratePattern();
  vibrationInterval = setInterval(vibratePattern, 1500);
}

function stopVibration() {
  if (vibrationInterval) {
    clearInterval(vibrationInterval);
    vibrationInterval = null;
  }
  if (navigator.vibrate) {
    navigator.vibrate(0);
  }
}

// ========== TTS (VOZ) ==========
function initTTS() {
  if ('speechSynthesis' in window) {
    ttsInstance = {
      speak: (text) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.9;
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
      }
    };
    console.log('✅ TTS inicializado');
  }
}

function speakMedicationName() {
  if (ttsInstance && currentAlarmMed && isAlarmActive) {
    console.log(`🗣️ Falando: Hora do remédio ${currentAlarmMed}`);
    ttsInstance.speak(`Dona Graça, hora do remédio ${currentAlarmMed}`);
  }
}

// ========== WAKE LOCK ==========
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('✅ Wake Lock ativado');
      
      document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      });
    } catch(e) {
      console.log('⚠️ Wake Lock não disponível');
    }
  }
}

// ========== VERIFICADOR DE ALARMES ==========
function startAlarmChecker() {
  // Verificar a cada 5 segundos (mais rápido para precisão)
  setInterval(() => {
    checkAlarms();
  }, 5000);
  
  // Verificar também no minuto exato
  const now = new Date();
  const msToNextMinute = (60 - now.getSeconds()) * 1000;
  setTimeout(() => {
    checkAlarms();
    setInterval(() => checkAlarms(), 60000);
  }, msToNextMinute);
}

function checkAlarms() {
  const now = new Date();
  const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  
  for (let alarm of alarms) {
    for (let time of alarm.times) {
      if (time === currentTime) {
        const key = `notified_${alarm.id}_${time}_${now.toDateString()}`;
        if (!localStorage.getItem(key)) {
          console.log(`🔔 ALARME DISPARADO: ${alarm.med} às ${time}`);
          triggerAlarm(alarm.med);
          localStorage.setItem(key, 'true');
          
          // Limpar após 3 minutos
          setTimeout(() => localStorage.removeItem(key), 180000);
        }
      }
    }
  }
}

// ========== DISPARAR ALARME ==========
function triggerAlarm(medName) {
  if (isAlarmActive) return; // Já tem alarme ativo
  
  currentAlarmMed = medName;
  isAlarmActive = true;
  
  console.log(`🚨 ALARME ATIVO: ${medName}`);
  
  // Mostrar indicador visual
  const indicator = document.getElementById('alarmIndicator');
  if (indicator) indicator.style.display = 'block';
  
  // 1. Iniciar BIP contínuo
  startBeep();
  
  // 2. Iniciar VIBRAÇÃO contínua
  startVibration();
  
  // 3. Mostrar tela de alarme (mas NÃO fala ainda)
  const screen = document.getElementById('alarmScreen');
  const medElement = document.getElementById('alarmMedName');
  medElement.innerText = medName;
  screen.style.display = 'flex';
  
  // 4. Se a tela já estiver aberta no momento do disparo, fala imediatamente
  if (document.visibilityState === 'visible') {
    speakMedicationName();
  }
  // Senão, só vai falar quando o usuário abrir a tela (via visibilitychange)
}

// ========== PARAR ALARME ==========
function stopAlarm() {
  if (!isAlarmActive) return;
  
  console.log(`🛑 PARANDO ALARME: ${currentAlarmMed}`);
  
  // Parar BIP
  stopBeep();
  
  // Parar VIBRAÇÃO
  stopVibration();
  
  // Esconder tela
  document.getElementById('alarmScreen').style.display = 'none';
  
  // Esconder indicador
  const indicator = document.getElementById('alarmIndicator');
  if (indicator) indicator.style.display = 'none';
  
  // Registrar histórico
  if (currentAlarmMed) {
    history.unshift({
      id: Date.now(),
      med: currentAlarmMed,
      time: new Date().toLocaleString('pt-BR'),
      status: '✅ Tomado'
    });
    if (history.length > 100) history.pop();
    saveData();
  }
  
  // Resetar estado
  isAlarmActive = false;
  currentAlarmMed = '';
}

// ========== SNOOZE ==========
function snoozeAlarm() {
  if (!isAlarmActive) return;
  
  console.log(`⏰ SNOOZE: ${currentAlarmMed} - adiado 10min`);
  
  // Parar BIP e VIBRAÇÃO
  stopBeep();
  stopVibration();
  
  // Esconder tela
  document.getElementById('alarmScreen').style.display = 'none';
  
  // Esconder indicador
  const indicator = document.getElementById('alarmIndicator');
  if (indicator) indicator.style.display = 'none';
  
  // Registrar snooze no histórico
  const snoozeMed = currentAlarmMed;
  history.unshift({
    id: Date.now(),
    med: snoozeMed,
    time: new Date().toLocaleString('pt-BR'),
    status: '⏰ Adiado 10min'
  });
  saveData();
  
  // Resetar estado atual
  isAlarmActive = false;
  
  // Reagendar em 10 minutos
  setTimeout(() => {
    console.log(`⏰ Reagendando alarme para: ${snoozeMed}`);
    triggerAlarm(snoozeMed);
  }, 600000); // 10 minutos
  
  currentAlarmMed = '';
}

// ========== CRUD ALARMES ==========
function addAlarm() {
  const med = document.getElementById('med').value.trim();
  const times = [];
  for(let i = 1; i <= 3; i++) {
    const time = document.getElementById(`time${i}`).value;
    if(time) times.push(time);
  }
  
  if(!med || times.length === 0) {
    alert('⚠️ Preencha o medicamento e pelo menos 1 horário');
    return;
  }
  
  alarms.push({
    id: Date.now(),
    med: med,
    times: times
  });
  
  saveData();
  render();
  updateAlarmCount();
  
  // Limpar campos
  document.getElementById('med').value = '';
  for(let i = 1; i <= 3; i++) {
    document.getElementById(`time${i}`).value = '';
  }
  
  // Feedback
  if (navigator.vibrate) navigator.vibrate(100);
}

function removeAlarm(id) {
  if (!confirm('Remover este lembrete?')) return;
  alarms = alarms.filter(a => a.id !== id);
  saveData();
  render();
  updateAlarmCount();
}

function render() {
  const listDiv = document.getElementById('list');
  if(alarms.length === 0) {
    listDiv.innerHTML = '<div class="empty-state">✨ Nenhum lembrete cadastrado</div>';
    return;
  }
  
  listDiv.innerHTML = alarms.map(a => `
    <div>
      <div class="alarm-item">
        <div class="alarm-info">
          <strong>💊 ${escapeHtml(a.med)}</strong>
          <div class="alarm-times">⏰ ${a.times.join(' • ')}</div>
        </div>
        <button class="delete" onclick="removeAlarm(${a.id})">❌</button>
      </div>
    </div>
  `).join('');
}

function updateAlarmCount() {
  document.getElementById('alarmCount').textContent = alarms.length;
}

// ========== HISTÓRICO ==========
function showHistory() {
  const modal = document.getElementById('historyModal');
  const historyDiv = document.getElementById('historyList');
  
  if(history.length === 0) {
    historyDiv.innerHTML = '<div class="empty-state">📭 Nenhum registro</div>';
  } else {
    historyDiv.innerHTML = history.slice(0, 50).map(h => `
      <div class="history-item">
        <strong>💊 ${escapeHtml(h.med)}</strong><br>
        📅 ${h.time}<br>
        ${h.status}
      </div>
    `).join('');
  }
  modal.style.display = 'block';
}

function closeHistory() {
  document.getElementById('historyModal').style.display = 'none';
}

function clearHistory() {
  if (!confirm('Limpar histórico?')) return;
  history = [];
  saveData();
  showHistory();
}

// ========== UTILIDADES ==========
function loadData() {
  const savedAlarms = localStorage.getItem('alarms_plus_final');
  const savedHistory = localStorage.getItem('history_plus_final');
  alarms = savedAlarms ? JSON.parse(savedAlarms) : [];
  history = savedHistory ? JSON.parse(savedHistory) : [];
}

function saveData() {
  localStorage.setItem('alarms_plus_final', JSON.stringify(alarms));
  localStorage.setItem('history_plus_final', JSON.stringify(history));
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ========== TESTE MANUAL ==========
function testAlarm() {
  triggerAlarm('TESTE - Paracetamol');
}

// ========== EXPORTAR FUNÇÕES GLOBAIS ==========
window.addAlarm = addAlarm;
window.removeAlarm = removeAlarm;
window.stopAlarm = stopAlarm;
window.snoozeAlarm = snoozeAlarm;
window.showHistory = showHistory;
window.closeHistory = closeHistory;
window.clearHistory = clearHistory;
window.testAlarm = testAlarm;

console.log('✅ App pronto!');
console.log('🎯 BIP + VIBRAÇÃO contínua até abrir a tela');
console.log('🗣️ Voz só fala quando a tela é aberta');
console.log('🧪 Teste: digite testAlarm() no console');
</script>

</body>
</html>
